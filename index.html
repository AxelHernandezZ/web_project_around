<!doctype html>
<html lang="es">
  <head>
    <title>Around the U.S.</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Around the U.S." />
    <meta name="keywords" content="Around, U.S., travel, adventure" />
    <meta name="author" content="Axel Andres Hernandez Zavaleta" />

    <link rel="stylesheet" href="pages/index.css" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header">
        <div class="header__content">
          <img
            src="images/logo-around.svg"
            alt="Around the U.S. Logo"
            class="logo"
          />
        </div>
      </header>
      <main class="page__main">
        <section class="profile">
          <div class="profile__avatar">
            <img
              src="images/profile/profile-picture.jpg"
              alt="Profile Picture"
              class="profile__avatar-image"
            />
          </div>

          <div class="profile__info">
            <div class="profile__info-name">
              <p class="profile__info-name-text">Jacques Cousteau</p>

              <div class="profile__info-editbutton">
                <button class="profile__info-editbutton-edit">
                  <img
                    class="profile__info-editbutton-image"
                    src="images/profile/edit_btn.png"
                    alt="Button edit"
                  />
                </button>
              </div>
            </div>

            <div class="profile__info-explorador">
              <p class="profile__info-explorador-text">Explorador</p>
            </div>
          </div>

          <div class="profile__info-addbutton">
            <button class="profile__info-addbutton-add">
              <img
                class="profile__info-addbutton-image"
                src="images/profile/add-btn.png"
                alt="Button add"
              />
            </button>
          </div>
        </section>
        <section class="elements">
          <div class="elements__grid">
            <figure class="elements__grid-card">
              <div class="elements__grid-card-header">
                <img
                  class="elements__grid-card-image"
                  src="images/grid/grid_images/grid-img-1.jpg"
                  alt="imagen1"
                />
              </div>

              <div class="elements__grid-card-footer">
                <p class="elements__grid-card-footer-text">Valle de Yosemite</p>
                <img
                  class="elements__grid-card-footer-icon"
                  src="images/grid/grid_icons/btn_heart_icon_empty.png"
                  alt="heart empty"
                />
              </div>
            </figure>

            <figure class="elements__grid-card">
              <div class="elements__grid-card-header">
                <img
                  class="elements__grid-card-image"
                  src="images/grid/grid_images/grid-img-2.jpg"
                  alt="imagen1"
                />
              </div>

              <div class="elements__grid-card-footer">
                <p class="elements__grid-card-footer-text">Lago Louise</p>
                <img
                  class="elements__grid-card-footer-icon"
                  src="images/grid/grid_icons/btn_heart_icon_empty.png"
                  alt="heart empty"
                />
              </div>
            </figure>

            <figure class="elements__grid-card">
              <div class="elements__grid-card-header">
                <img
                  class="elements__grid-card-image"
                  src="images/grid/grid_images/grid-img-3.jpg"
                  alt="imagen1"
                />
              </div>

              <div class="elements__grid-card-footer">
                <p class="elements__grid-card-footer-text">Montañas Calvas</p>
                <img
                  class="elements__grid-card-footer-icon"
                  src="images/grid/grid_icons/btn_heart_icon_empty.png"
                  alt="heart empty"
                />
              </div>
            </figure>

            <figure class="elements__grid-card">
              <div class="elements__grid-card-header">
                <img
                  class="elements__grid-card-image"
                  src="images/grid/grid_images/grid-img-4.jpg"
                  alt="imagen1"
                />
              </div>

              <div class="elements__grid-card-footer">
                <p class="elements__grid-card-footer-text">Latemar</p>
                <img
                  class="elements__grid-card-footer-icon"
                  src="images/grid/grid_icons/btn_heart_icon_empty.png"
                  alt="heart empty"
                />
              </div>
            </figure>

            <figure class="elements__grid-card">
              <div class="elements__grid-card-header">
                <img
                  class="elements__grid-card-image"
                  src="images/grid/grid_images/grid-img-5.jpg"
                  alt="imagen1"
                />
              </div>

              <div class="elements__grid-card-footer">
                <p class="elements__grid-card-footer-text">
                  Vanois National...
                </p>
                <img
                  class="elements__grid-card-footer-icon"
                  src="images/grid/grid_icons/btn_heart_icon_empty.png"
                  alt="heart empty"
                />
              </div>
            </figure>

            <figure class="elements__grid-card">
              <div class="elements__grid-card-header">
                <img
                  class="elements__grid-card-image"
                  src="images/grid/grid_images/grid-img-6.jpg"
                  alt="imagen1"
                />
              </div>

              <div class="elements__grid-card-footer">
                <p class="elements__grid-card-footer-text">Lago di Braies</p>
                <img
                  class="elements__grid-card-footer-icon"
                  src="images/grid/grid_icons/btn_heart_icon_empty.png"
                  alt="heart empty"
                />
              </div>
            </figure>
          </div>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyrigth">© 2024 Around The U.S.</p>
      </footer>
    </div>

    <div class="form form__background">
      <div class="form__body form_type_edit">
        <button class="form__close">✕</button>
        <div class="form__content">
          <h2 class="form__title">Editar perfil</h2>
          <input
            type="text"
            class="form__input form__name"
            placeholder="Nombre"
          />
          <input
            type="text"
            class="form__input form__about"
            placeholder="Acerca de mi"
          />
          <button class="form__save">Guardar</button>
        </div>
      </div>
    </div>
    <script src="scripts/index.js"></script>
  </body>
</html>
